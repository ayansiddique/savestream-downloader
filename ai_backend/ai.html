<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaveStream AI Assistant</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f3f4f6;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #1f2937;
        }

        .chat-container {
            background-color: #ffffff;
            width: 100%;
            max-width: 450px;
            border-radius: 12px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 600px;
        }

        .chat-header {
            background-color: #4f46e5;
            color: white;
            padding: 16px 20px;
            font-size: 1.25rem;
            font-weight: 600;
            text-align: center;
        }

        .chat-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background-color: #f9fafb;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 0.95rem;
            line-height: 1.4;
        }

        .ai-message {
            background-color: #e0e7ff;
            color: #3730a3;
            align-self: flex-start;
            border-bottom-left-radius: 0;
        }

        .user-message {
            background-color: #4f46e5;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 0;
        }

        .chat-input-area {
            display: flex;
            padding: 16px;
            background-color: #ffffff;
            border-top: 1px solid #e5e7eb;
            gap: 10px;
        }

        .chat-input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #d1d5db;
            border-radius: 9999px;
            outline: none;
            font-size: 0.95rem;
            transition: border-color 0.2s;
        }

        .chat-input:focus {
            border-color: #4f46e5;
        }

        .send-button {
            background-color: #4f46e5;
            color: white;
            border: none;
            border-radius: 9999px;
            padding: 0 20px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .send-button:hover {
            background-color: #4338ca;
        }

        .send-button:disabled {
            background-color: #9ca3af;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <div class="chat-header">
            SaveStream AI Assistant
        </div>
        
        <div class="chat-box" id="chatBox">
            <div class="message ai-message">
                Hello! I am the SaveStream AI Assistant. How can I help you download videos today?
            </div>
        </div>
        
        <div class="chat-input-area">
            <input type="text" id="userInput" class="chat-input" placeholder="Type your question..." autocomplete="off">
            <button id="sendBtn" class="send-button">Send</button>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chatBox');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const API_URL = 'http://127.0.0.1:8000/chat';

        function appendMessage(text, isAI) {
            const div = document.createElement('div');
            div.className = `message ${isAI ? 'ai-message' : 'user-message'}`;
            div.textContent = text;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            // 1. Display User Message
            appendMessage(text, false);
            userInput.value = '';
            
            // Disable inputs while fetching
            userInput.disabled = true;
            sendBtn.disabled = true;

            try {
                // 2. Call FastAPI Backend
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });
                
                if (!response.ok) throw new Error('API Error');
                
                const data = await response.json();
                
                // 3. Display AI Response
                appendMessage(data.response, true);
                
            } catch (error) {
                appendMessage('Sorry, I cannot connect to the backend server right now. Make sure the FastAPI server is running.', true);
            } finally {
                userInput.disabled = false;
                sendBtn.disabled = false;
                userInput.focus();
            }
        }

        // Event Listeners
        sendBtn.addEventListener('click', sendMessage);
        
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
    </script>

</body>
</html>
